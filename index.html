<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1A237E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Minutas">
<link rel="manifest" href="manifest.json">
<title>APP MINUTAS — Albera &amp; Asociados</title>
<style>
:root{
  --blue:#1A237E;--blue-dk:#0D1457;--blue-lt:#E8EAF6;
  --amber:#FF6F00;--amber-lt:#FFF3E0;
  --green:#2E7D32;--green-lt:#E8F5E9;
  --red:#C62828;--wa:#25D366;
  --bg:#F5F5F5;--sur:#FFFFFF;
  --t1:#212121;--t2:#757575;--t3:#BDBDBD;
  --bdr:#E0E0E0;--r:12px;--r-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;max-width:480px;margin:0 auto;min-height:100dvh}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input,textarea,select{font:inherit;color:var(--t1)}
a{color:var(--blue);text-decoration:none}

/* NAV */
.nav{background:var(--blue);color:#fff;display:flex;align-items:center;padding:12px 16px;gap:10px;position:sticky;top:0;z-index:100;padding-top:max(12px,env(safe-area-inset-top))}
.nav-back{color:rgba(255,255,255,.85);font-size:24px;line-height:1;padding-right:6px;flex-shrink:0}
.nav-title{flex:1;font-size:17px;font-weight:600;letter-spacing:.2px}
.nav-action{color:rgba(255,255,255,.9);font-size:15px;padding:4px 0 4px 6px;white-space:nowrap}

/* LAYOUT */
.screen{padding:12px 12px calc(76px + env(safe-area-inset-bottom))}
.card{background:var(--sur);border-radius:var(--r);border:.5px solid var(--bdr);padding:14px;margin-bottom:12px}
.slabel{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.row{display:flex;gap:8px}

/* FIELD */
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.field input,.field textarea{width:100%;background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r-sm);padding:9px 12px;font-size:14px;outline:none;-webkit-appearance:none}
.field input:focus,.field textarea:focus{border-color:var(--blue)}
.field textarea{resize:none;line-height:1.4;min-height:52px}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border-radius:var(--r);padding:14px 20px;font-size:15px;font-weight:600;cursor:pointer;border:none;width:100%;margin-bottom:10px;-webkit-appearance:none}
.btn:active{opacity:.78}
.btn-primary{background:var(--blue);color:#fff}
.btn-secondary{background:var(--sur);color:var(--blue);border:1.5px solid var(--blue)}
.btn-email{background:#E3F2FD;color:#0D47A1;border:1.5px solid #1565C0}
.btn-wa{background:#E8F5E9;color:#1B5E20;border:1.5px solid #388E3C}
.btn-pdf{background:var(--amber-lt);color:#E65100;border:1.5px solid var(--amber)}
.btn-danger{background:#FFEBEE;color:var(--red);border:1.5px solid var(--red)}
.btn-sm{padding:9px 14px;font-size:13px;border-radius:var(--r-sm)}
.btn-nobottom{margin-bottom:0}

/* FAB */
.fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));right:20px;width:58px;height:58px;border-radius:50%;background:var(--blue);color:#fff;font-size:30px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(26,35,126,.45);border:none;cursor:pointer;z-index:90;line-height:1}

/* MINUTA CARD */
.m-card{background:var(--sur);border-radius:var(--r);border:.5px solid var(--bdr);padding:13px 12px 11px 16px;margin-bottom:10px;position:relative;overflow:hidden;cursor:pointer;display:flex;align-items:center;gap:8px;-webkit-tap-highlight-color:rgba(0,0,0,.05)}
.m-card:active{opacity:.8}
.m-bar{position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--green)}
.m-body{flex:1;min-width:0}
.m-proyecto{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-tipo{font-size:12px;color:var(--blue);font-weight:500;margin:2px 0}
.m-footer{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;align-items:center}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:8px}
.badge-p{background:#FFF3E0;color:#E65100}
.badge-d{background:var(--green-lt);color:var(--green)}
.badge-n{background:var(--bg);color:var(--t2);border:.5px solid var(--bdr)}
.m-date{font-size:11px;color:var(--t3);margin-left:auto}
.m-arr{color:var(--t3);font-size:22px;flex-shrink:0}

/* TASK ITEM */
.task{border:.5px solid var(--bdr);border-radius:var(--r-sm);margin-bottom:8px;background:var(--sur);overflow:hidden}
.task.done{background:#F9FBE7;border-color:#C5E1A5}
.task-head{display:flex;align-items:center;gap:7px;padding:9px 10px}
.task-cb{font-size:19px;flex-shrink:0;cursor:pointer;line-height:1}
.task-cb.done{color:var(--green)}
.task-cb.pend{color:var(--t3)}
.task-num{font-size:12px;color:var(--t2);font-weight:600;flex-shrink:0;min-width:18px}
.task-title-inp{flex:1;border:none;background:transparent;font-size:13px;font-weight:600;outline:none;color:var(--t1);min-width:0;padding:0}
.task.done .task-title-inp{text-decoration:line-through;color:var(--t2)}
.task-tags{display:flex;gap:4px;flex-shrink:0}
.tag-date{font-size:10px;background:var(--amber-lt);color:var(--amber);padding:2px 5px;border-radius:4px;font-weight:600;white-space:nowrap}
.tag-resp{font-size:10px;background:var(--blue-lt);color:var(--blue);padding:2px 6px;border-radius:4px;font-weight:600;letter-spacing:.5px}
.task-del{color:var(--red);font-size:14px;padding:4px 2px;flex-shrink:0;cursor:pointer}
.task-body{padding:0 10px 10px 34px;display:none}
.task.expanded .task-body{display:block}
.task-body .field{margin-bottom:6px}
.task-body .field label{font-size:10px}
.task-body .field input{font-size:13px;padding:7px 10px}
.task-body .field textarea{font-size:13px;padding:7px 10px;min-height:44px}
.task-expand{font-size:11px;color:var(--t3);padding:2px 4px;cursor:pointer;flex-shrink:0}

/* CAPTURE AREA */
.capture-area{background:var(--sur);border-radius:var(--r);border:2px dashed var(--bdr);min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;overflow:hidden;cursor:pointer}
.capture-img{width:100%;max-height:300px;object-fit:contain;display:block}
.capture-icon{font-size:52px;line-height:1}
.capture-hint{font-size:13px;color:var(--t2);text-align:center;padding:0 24px}

/* OCR PROGRESS */
.ocr-box{text-align:center;padding:20px 16px}
.ocr-title{font-size:15px;font-weight:600;margin-bottom:4px}
.ocr-sub{font-size:13px;color:var(--t2);margin-bottom:14px}
.ocr-bar{width:100%;height:8px;border-radius:4px;background:var(--bg);overflow:hidden;margin-bottom:6px}
.ocr-fill{height:100%;background:var(--blue);border-radius:4px;transition:width .3s;width:0}
.ocr-pct{font-size:13px;color:var(--t2)}

/* SEND SUMMARY */
.send-summary{background:var(--blue);border-radius:var(--r);padding:18px;margin-bottom:12px;color:#fff}
.send-proy{font-size:17px;font-weight:700;margin-bottom:4px;letter-spacing:.2px}
.send-meta{font-size:13px;opacity:.8;margin-bottom:10px}
.send-badges{display:flex;gap:8px;flex-wrap:wrap}
.send-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:8px;background:rgba(255,255,255,.18);color:#fff}
.send-badge-g{background:rgba(46,125,50,.35)}

/* CONTACTS */
.c-row{background:var(--sur);border:.5px solid var(--bdr);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.c-toggle{width:28px;height:28px;border-radius:50%;border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;flex-shrink:0;color:#fff}
.c-toggle.on{background:var(--green);border-color:var(--green)}
.c-toggle.off{background:transparent;border-color:var(--bdr)}
.c-info{flex:1;min-width:0}
.c-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.c-det{font-size:12px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.c-acts{display:flex;gap:2px;flex-shrink:0}
.c-btn{font-size:18px;padding:4px 6px;cursor:pointer}

/* RECIPIENT ROW */
.r-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border:.5px solid var(--bdr);border-radius:var(--r-sm);margin-bottom:6px;cursor:pointer;background:var(--sur);-webkit-tap-highlight-color:rgba(0,0,0,.04)}
.r-row.sel{border-color:var(--blue);background:var(--blue-lt)}
.r-check{width:22px;height:22px;border-radius:5px;border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;color:#fff}
.r-row.sel .r-check{background:var(--blue);border-color:var(--blue)}
.r-name{font-size:14px;font-weight:500;flex:1}
.r-det{font-size:12px;color:var(--t2)}

/* ADD TASK BTN */
.add-task-btn{display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px dashed var(--blue);border-radius:var(--r-sm);padding:11px;color:var(--blue);font-size:14px;font-weight:600;cursor:pointer;width:100%;background:none;margin-top:4px}

/* PAGES GRID */
.pages-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.page-card{background:var(--sur);border-radius:var(--r-sm);border:.5px solid var(--bdr);overflow:hidden;position:relative}
.page-thumb{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;background:#eee}
.page-footer{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;font-size:12px;font-weight:600;color:var(--blue)}
.page-del{font-size:16px;color:var(--red);cursor:pointer;padding:2px 0;line-height:1}
.page-add-card{border-radius:var(--r-sm);border:1.5px dashed var(--bdr);aspect-ratio:3/4;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:var(--blue);background:var(--sur)}
.page-add-card:active{opacity:.7}
.page-add-icon{font-size:26px;line-height:1}
.page-add-label{font-size:11px;font-weight:600}

/* TIP */
.tip{background:#E3F2FD;border-radius:var(--r-sm);padding:10px 14px;margin-bottom:12px;font-size:13px;color:#1565C0;line-height:1.5}
.tip b{font-weight:600}

/* EMPTY */
.empty{text-align:center;padding:52px 24px}
.empty-icon{font-size:54px;margin-bottom:16px}
.empty-title{font-size:19px;font-weight:600;margin-bottom:8px}
.empty-text{font-size:14px;color:var(--t2);line-height:1.6}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end}
.modal-card{background:var(--sur);border-radius:20px 20px 0 0;padding:22px 18px calc(22px + env(safe-area-inset-bottom));width:100%;max-height:88dvh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:18px}
.modal-actions{display:flex;gap:10px;margin-top:6px}
.modal-actions .btn{flex:1;margin-bottom:0}

/* SECTION HEADER ROW */
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-hdr .slabel{margin:0}

/* REMINDER SCREEN */
.rem-proj{background:var(--sur);border-radius:var(--r);border:.5px solid var(--bdr);margin-bottom:12px;overflow:hidden}
.rem-proj-hdr{background:var(--blue);color:#fff;padding:11px 14px;display:flex;justify-content:space-between;align-items:center}
.rem-proj-name{font-size:14px;font-weight:700;letter-spacing:.3px}
.rem-proj-meta{font-size:12px;opacity:.8}
.rem-task{padding:9px 14px;border-bottom:.5px solid var(--bdr);display:flex;align-items:flex-start;gap:8px}
.rem-task:last-child{border-bottom:none}
.rem-task-body{flex:1;font-size:13px}
.rem-task-title{font-weight:600;color:var(--t1)}
.rem-task-meta{font-size:11px;color:var(--t2);margin-top:2px}
.rem-proj-acts{display:flex;gap:8px;padding:10px 14px;border-top:.5px solid var(--bdr);background:var(--bg)}

/* IMPORT BANNER */
.import-banner{background:#E8F5E9;border:1px solid #A5D6A7;border-radius:var(--r-sm);padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.import-banner-text{flex:1;font-size:13px;color:var(--green)}
.btn-import{background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}

/* PRINT */
@media print{
  .nav,.fab,.btn,.add-task-btn,.no-print,nav{display:none!important}
  body{background:#fff;max-width:none;font-size:10.5pt;color:#000}
  .screen{padding:0}
  .card{border:1px solid #ccc;margin-bottom:10px;break-inside:avoid;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .task{border:1px solid #ccc;break-inside:avoid;margin-bottom:6px}
  .task-body{display:block!important}
  .send-summary{background:#1A237E!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .task-del,.task-expand,.c-acts{display:none!important}
  .task-title-inp{font-size:11pt}
  .field input,.field textarea{border:none;background:transparent;padding:0}
  .badge,.tag-date,.tag-resp,.send-badge{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="inp-cam" accept="image/*" capture="environment" style="display:none">
<input type="file" id="inp-gal" accept="image/*" style="display:none">
<div id="modal-root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
'use strict';

/* ══════════════════════════════════════════
   STORAGE
══════════════════════════════════════════ */
const ld = (k,d) => { try{ return JSON.parse(localStorage.getItem(k))??d; }catch{ return d; } };
const sv = (k,v) => localStorage.setItem(k, JSON.stringify(v));

const DEF_CONTACTS = [
  {id:'c0',nombre:'Gustavo Albera',email:'g.albera@alberayasociados.com',tel:'',on:true}
];
const DB = {
  minutas:  { get:()=>ld('aa:m',[]),           set:v=>sv('aa:m',v) },
  contacts: { get:()=>ld('aa:c',DEF_CONTACTS), set:v=>sv('aa:c',v) },
};

/* ══════════════════════════════════════════
   UTILS
══════════════════════════════════════════ */
const uid  = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const today= () => new Date().toLocaleDateString('es-AR');
const esc  = s  => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const $    = id => document.getElementById(id);
const el   = (tag,cls,html) => { const e=document.createElement(tag); if(cls)e.className=cls; if(html)e.innerHTML=html; return e; };

/* ══════════════════════════════════════════
   OCR PARSER
══════════════════════════════════════════ */
function parseOCR(raw) {
  const lines = raw.split('\n').map(l=>l.trim()).filter(l=>l.length>1);
  if (!lines.length) return mkMinuta();

  const DATE_RE = /\b(\d{1,2}\/\d{1,2}(?:\/\d{2,4})?)\b/;
  const RESP_RE = /\b([A-ZÁÉÍÓÚÑ]{2,5}(?:\/[A-ZÁÉÍÓÚÑ]{2,5})?)\s*$/u;

  function detectCb(line) {
    // ── 1. Checkbox Unicode explícito ──────────────────────────────────
    if (/^[■●▪▸]\s*/u.test(line))
      return {ok:true,done:true,  c:line.replace(/^[■●▪▸]\s*/u,'').trim()};
    if (/^\[[Xx✓✔]\]\s*/.test(line))
      return {ok:true,done:true,  c:line.replace(/^\[[Xx✓✔]\]\s*/,'').trim()};
    if (/^[□○◻☐]\s*/u.test(line))
      return {ok:true,done:false, c:line.replace(/^[□○◻☐]\s*/u,'').trim()};
    if (/^\[\s*\]\s*/.test(line))
      return {ok:true,done:false, c:line.replace(/^\[\s*\]\s*/,'').trim()};

    // ── 2. ESTRATEGIA PRINCIPAL: detectar por "PALABRA:" ──────────────
    // El formato de esta minuta es siempre: [checkbox] TEMA: descripción — RESP
    // El checkbox pintado a mano NUNCA produce el char Unicode exacto.
    // La firma confiable es "PALABRA(S) EN MAYÚSCULAS seguidas de ':'".
    // Se activa desde la primera línea de encabezado (hc >= 1).
    if (hc >= 1) {
      // Excluir líneas de encabezado que contienen palabras clave de participantes
      // para que no sean clasificadas como tareas
      if (/^(PRESENTES|PARTICIPANTES|ASISTENTES)\s*:/iu.test(line)) return {ok:false};
      // Permite prefijo de hasta 4 chars (el checkbox mal leído) + TEMA:
      const TOPIC_RE = /^(.{0,4}?)([A-ZÁÉÍÓÚÑ][A-ZÁÉÍÓÚÑ0-9\s\.\-\/ÑÁÉÍÓÚ]{0,35}):/u;
      const tm = TOPIC_RE.exec(line);
      if (tm) {
        const prefix = tm[1] || '';
        // ■ pintado → OCR lo lee como carácter "oscuro/macizo": m,n,H,B,W,w,#,@,|
        // □ vacío  → OCR lo lee como carácter "hueco": o,O,0,D,U,Q,C
        const done = /[■●▪mMnNHBWw#@|]/.test(prefix);
        // Contenido limpio: quitar el prefijo (checkbox basura) y el '—' final
        const content = line.replace(/^.{0,4}?(?=[A-ZÁÉÍÓÚÑ])/u,'').trim();
        return {ok:true, done, c:content};
      }
    }

    // ── 3. Fallback: checkbox mal leído + texto en mayúsculas ──────────
    // Para cuando el checkbox se lee como char suelto SIN seguir TEMA:
    if (/^[mMnNHBWw]\s+[A-ZÁÉÍÓÚÑ]/u.test(line))
      return {ok:true,done:true,  c:line.replace(/^[mMnNHBWw]\s+/,'').trim()};
    if (/^[oO0DUQCGdugq]\s+[A-ZÁÉÍÓÚÑ]/u.test(line))
      return {ok:true,done:false, c:line.replace(/^[oO0DUQCGdugq]\s+/,'').trim()};

    // ── 4. Bullet / lista numerada ──────────────────────────────────────
    if (/^[-–—\*]\s+\S/.test(line))
      return {ok:true,done:false, c:line.replace(/^[-–—\*]\s+/,'').trim()};
    if (/^\d{1,2}[.):\-]\s+\S/.test(line))
      return {ok:true,done:false, c:line.replace(/^\d{1,2}[.):\-]\s+/,'').trim()};

    // ── 5. Último recurso: inicia en mayús + tiene dos puntos + tiene responsable
    const hasResp = RESP_RE.test(line);
    const hasColon = line.includes(':');
    const startsUpper = /^[A-ZÁÉÍÓÚÑ\s]{4,}/u.test(line);
    const shortPrefix = /^[A-Za-z0-9]{1,3}\s+[A-ZÁÉÍÓÚÑ]/.test(line);
    let content = line;
    if (shortPrefix) content = line.replace(/^[A-Za-z0-9]{1,3}\s+/, '').trim();
    if (hasResp && hasColon && startsUpper) return {ok:true, done:false, c:content};
    if (hasResp && hasColon && shortPrefix) return {ok:true, done:false, c:content};
    if (hasResp && DATE_RE.test(line))     return {ok:true, done:false, c:content};

    return {ok:false};
  }

  function parseTarea(c,done) {
    let rest=c, titulo='', desc='', fecha='', resp='';
    // Extraer responsable al final (2-5 mayúsculas)
    const rm = rest.match(RESP_RE);
    if (rm) { resp=rm[1]; rest=rest.replace(RESP_RE,'').replace(/\s*[-–—_]+\s*$/,'').trim(); }
    // Extraer fecha
    const dm = rest.match(DATE_RE);
    if (dm) { fecha=dm[1]; rest=rest.replace(DATE_RE,'').replace(/\s*[-–—]+\s*/g,' ').trim(); }
    // Separar TÍTULO (antes del primer ':') de descripción
    const ci = rest.indexOf(':');
    if (ci>0 && ci<rest.length*.7) {
      titulo=rest.slice(0,ci).trim().toUpperCase();
      desc=rest.slice(ci+1).replace(/\s*[-–—_]+\s*$/,'').trim(); // limpiar '—' final
    } else { titulo=rest.replace(/\s*[-–—_]+\s*$/,'').trim().toUpperCase(); }
    if (!titulo) titulo=c.toUpperCase();
    return {id:uid(),titulo,desc,fecha,resp,done};
  }

  let proyecto='',tipoReunion='',fecha='',participantes=[],tareas=[];
  let hc=0, inTasks=false;

  for (const line of lines) {
    // ── Detección de PRESENTES/PARTICIPANTES/ASISTENTES en cualquier posición ──
    // Se verifica ANTES de detectCb para que no queden sin capturar si aparecen
    // en la línea 2 (hc===1) o antes de que se detecten tareas.
    if (/participantes|asistentes|presentes/i.test(line) && line.includes(':')) {
      const ps = line.replace(/^[^:]+:\s*/,'').split(/[,;]/).map(p=>p.trim()).filter(Boolean);
      if (ps.length > 0) participantes = ps;
      if (!inTasks) hc++;   // contar como línea de encabezado si aún no hay tareas
      continue;
    }

    const cb = detectCb(line);
    if (cb.ok) { inTasks=true; tareas.push(parseTarea(cb.c,cb.done)); continue; }
    if (inTasks) continue;
    hc++;
    if      (hc===1) { proyecto=line; }
    else if (hc===2) {
      const dm=line.match(DATE_RE);
      if(dm){ fecha=dm[1]; tipoReunion=line.replace(DATE_RE,'').replace(/[-–—]/g,'').trim(); }
      else tipoReunion=line;
    } else {
      // Fallback: línea de participantes sin la palabra clave, separados por coma
      if (line.includes(',')) {
        const ps=line.split(',').map(p=>p.trim()).filter(Boolean);
        if (ps.length>1) participantes=ps;
      }
    }
  }
  if (!fecha) fecha=today();
  return {id:uid(),proyecto,tipoReunion,fecha,participantes,tareas,img:null,creadaEn:new Date().toISOString()};
}

function mkMinuta(){
  return {id:uid(),numero:0,proyecto:'',tipoReunion:'',fecha:today(),participantes:[],tareas:[],img:null,creadaEn:new Date().toISOString()};
}
function mkTarea(){
  return {id:uid(),titulo:'',desc:'',fecha:'',resp:'',done:false};
}

/* ══════════════════════════════════════════
   FORMAT / EXPORT
══════════════════════════════════════════ */
function fmtWA(m) {
  const L=['*'+m.proyecto.toUpperCase()+'*',`${m.tipoReunion} — ${m.fecha}`];
  if(m.participantes?.length) L.push('Participantes: '+m.participantes.join(', '));
  L.push('','─'.repeat(36));
  const pend=m.tareas.filter(t=>!t.done), done=m.tareas.filter(t=>t.done);
  if(pend.length){ L.push('*PENDIENTES*'); pend.forEach((t,i)=>{
    L.push(`${i+1}. □ *${t.titulo}*`);
    if(t.desc) L.push('   '+t.desc);
    const mt=[]; if(t.fecha)mt.push('📅 '+t.fecha); if(t.resp)mt.push('👤 '+t.resp);
    if(mt.length) L.push('   '+mt.join('  '));
  });}
  if(done.length){ L.push('','*EJECUTADAS*'); done.forEach(t=>L.push('■ ~'+t.titulo+'~'+(t.resp?' — '+t.resp:''))); }
  L.push('','─'.repeat(36),'_Minuta — Albera & Asociados_');
  return L.join('\n');
}

function fmtEmail(m) {
  const S='─'.repeat(48);
  const L=[m.proyecto.toUpperCase(),S,'Reunión: '+m.tipoReunion,'Fecha: '+m.fecha];
  if(m.participantes?.length) L.push('Participantes: '+m.participantes.join(', '));
  L.push('','TAREAS:',S);
  m.tareas.forEach((t,i)=>{
    L.push('',(t.done?'■':'□')+'  '+(i+1)+'. '+t.titulo);
    if(t.desc) L.push('     '+t.desc);
    const mt=[]; if(t.fecha)mt.push('Fecha límite: '+t.fecha); if(t.resp)mt.push('Responsable: '+t.resp);
    if(mt.length) L.push('     '+mt.join('  |  '));
  });
  L.push('',S,'Minuta — Albera & Asociados','g.albera@alberayasociados.com');
  return L.join('\n');
}

function fmtSubject(m){ return `MINUTA | ${m.proyecto.toUpperCase()} | ${m.tipoReunion} ${m.fecha}`; }

function loadImg(file){
  if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    if(S.imgPages.length < 5) S.imgPages.push(e.target.result);
    render();
  };
  r.readAsDataURL(file);

async function startOCR(){
  const procBtn=$('btn-proc'), ocrBox=$('ocr-box');
  if(procBtn) procBtn.style.display='none';
  if(ocrBox)  ocrBox.style.display='block';

  const pages = S.imgPages;
  const allTexts = [];
  let currentPage = 0;

  try{
    const worker = await Tesseract.createWorker('spa', 1, {
      logger: m => {
        if(m.status==='recognizing text'){
          const overallPct = Math.round((currentPage + m.progress) / pages.length * 100);
          const f=$('ocr-fill'), p=$('ocr-pct'), t=$('ocr-title');
          if(f) f.style.width=overallPct+'%';
          if(p) p.textContent=overallPct+'%';
          if(t && pages.length>1) t.textContent=`Procesando página ${currentPage+1} de ${pages.length}…`;
        }
      }
    });

    for(currentPage=0; currentPage<pages.length; currentPage++){
      const {data:{text}} = await worker.recognize(pages[currentPage]);
      allTexts.push(text.trim());
    }

    await worker.terminate();
    const combined = allTexts.join('\n\n');
    S.ocrRawText = combined;
    S.editMinuta = parseOCR(combined);
    S.editMinuta.img = pages[0] || null;
    go('review');
  }catch(err){
    console.error('OCR error:',err);
    const ok=confirm('El reconocimiento tuvo un problema. ¿Continuar con ingreso manual?');
    if(ok) skipOCR();
    else { if(procBtn) procBtn.style.display='flex'; if(ocrBox) ocrBox.style.display='none'; }
  }
}

function skipOCR(){
  S.ocrRawText = null;
  S.editMinuta=mkMinuta();
  S.editMinuta.img=S.imgPages[0]||null;

}

  m.participantes=p.split(',').map(x=>x.trim()).filter(Boolean);
}

function saveReview(){
  syncHeader();
  const m=S.editMinuta;
  if(!m.proyecto){ alert('Ingresá el nombre del proyecto antes de continuar.'); $('f-proy')?.focus(); return; }
  const ms=DB.minutas.get();
  // Asignar número correlativo si es nueva minuta del proyecto
  if(!m.numero || m.numero===0){
    const prevMs=ms.filter(x=>x.proyecto.toLowerCase().trim()===m.proyecto.toLowerCase().trim()&&x.id!==m.id);
    const maxNum=prevMs.reduce((mx,x)=>Math.max(mx,x.numero||0),0);
    m.numero=maxNum+1;
  }
  const idx=ms.findIndex(x=>x.id===m.id);
  if(idx>=0) ms[idx]=m; else ms.unshift(m);
  DB.minutas.set(ms);
  S.minuta=m;
  S.selContacts=new Set(DB.contacts.get().filter(c=>c.on).map(c=>c.id));
  go('send');
}

async function generatePDF() {
  const m = S.minuta;
  const btn = $('btn-pdf');
  if (btn) { btn.textContent = '⏳ Generando PDF…'; btn.disabled = true; }

  try {
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'position:fixed;left:-9999px;top:0;width:210mm;background:#fff';
    wrapper.innerHTML = buildPDFHTML(m);
    document.body.appendChild(wrapper);

    const filename = 'Minuta_'
      + (m.proyecto||'sin-nombre').replace(/[^a-zA-Z0-9áéíóúñÁÉÍÓÚÑ\s]/g,'').replace(/\s+/g,'_').slice(0,40)
      + '_' + (m.fecha||'').replace(/\//g,'-')
      + '.pdf';

    await html2pdf().set({
      margin: [12, 12, 12, 12],
      filename,
      image: { type: 'jpeg', quality: 0.97 },
      html2canvas: { scale: 2, useCORS: true, logging: false },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    }).from(wrapper).save();

    document.body.removeChild(wrapper);
  } catch(err) {
    console.error('PDF error:', err);
    alert('No se pudo generar el PDF. Intentá de nuevo.');
  }

  if (btn) { btn.innerHTML = '📄 &nbsp; Descargar PDF'; btn.disabled = false; }
}

function importPendingTasks(prevId){
  const prevM = DB.minutas.get().find(x=>x.id===prevId);
  if(!prevM) return;
  const pend = prevM.tareas.filter(t=>!t.done).map(t=>({...t, id:uid(), done:false}));
  if(!pend.length){ alert('No hay tareas pendientes en esa minuta.'); return; }
  // Evitar duplicados por título
  const existing = new Set(S.editMinuta.tareas.map(t=>t.titulo.toLowerCase().trim()));
  const toAdd = pend.filter(t=>!existing.has(t.titulo.toLowerCase().trim()));
  S.editMinuta.tareas = [...toAdd, ...S.editMinuta.tareas];
  render();
}

async function generateXLS(){
  const btn=$('btn-xls');
  if(btn){ btn.textContent='⏳ Generando…'; btn.disabled=true; }
  try{
    if(!window.XLSX){
      await new Promise((ok,fail)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
        s.onload=ok; s.onerror=fail;
        document.head.appendChild(s);
      });
    }
    const m=S.minuta;
    const wb=XLSX.utils.book_new();
    const data=[
      [`PROYECTO: ${m.proyecto.toUpperCase()}`, '', '', `Minuta #${m.numero||1}`, '', ''],
      [`REUNIÓN: ${m.tipoReunion}`, '', `FECHA: ${m.fecha}`, '', '', ''],
      [`PARTICIPANTES: ${(m.participantes||[]).join(', ')}`, '', '', '', '', ''],
      [],
      ['N°','ESTADO','TAREA','DESCRIPCIÓN','FECHA LÍMITE','RESPONSABLE'],
      ...m.tareas.map((t,i)=>[
        i+1,
        t.done?'EJECUTADA':'PENDIENTE',
        t.titulo,
        t.desc||'',
        t.fecha||'',
        t.resp||''
      ])
    ];
    const ws=XLSX.utils.aoa_to_sheet(data);
    ws['!cols']=[{wch:4},{wch:12},{wch:36},{wch:42},{wch:14},{wch:12}];
    // Estilo de encabezado (negrita en fila 5 = índice 4)
    ws['!merges']=[
      {s:{r:0,c:0},e:{r:0,c:2}},{s:{r:1,c:0},e:{r:1,c:1}},
      {s:{r:2,c:0},e:{r:2,c:5}}
    ];
    XLSX.utils.book_append_sheet(wb,ws,'Minuta');
    // Hoja 2: solo pendientes
    const pend=m.tareas.filter(t=>!t.done);
    if(pend.length){
      const ws2=XLSX.utils.aoa_to_sheet([
        [`PENDIENTES — ${m.proyecto.toUpperCase()} — Minuta #${m.numero||1}`,'','','',''],
        [],
        ['N°','TAREA','DESCRIPCIÓN','FECHA LÍMITE','RESPONSABLE'],
        ...pend.map((t,i)=>[i+1,t.titulo,t.desc||'',t.fecha||'',t.resp||''])
      ]);
      ws2['!cols']=[{wch:4},{wch:36},{wch:42},{wch:14},{wch:12}];
      XLSX.utils.book_append_sheet(wb,ws2,'Pendientes');
    }
    const fn=`Minuta_${(m.proyecto||'').replace(/[^a-zA-Z0-9]/g,'_').slice(0,28)}_#${m.numero||1}_${(m.fecha||'').replace(/\//g,'-')}.xlsx`;
    XLSX.writeFile(wb,fn);
  }catch(e){
    console.error('XLS error:',e);
    alert('No se pudo generar el Excel. Intentá de nuevo.');
  }
  if(btn){ btn.innerHTML='📊 &nbsp; Exportar a Excel'; btn.disabled=false; }
}

function buildReminderText(projects){
  const fecha=new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
  const L=[`📋 *RECORDATORIO SEMANAL — ${fecha.toUpperCase()}*`,''];
  projects.forEach(({m,pend})=>{
    L.push(`*${m.proyecto.toUpperCase()}* — Minuta #${m.numero||'?'} (${m.fecha})`);
    pend.forEach(t=>{
      L.push(`□ *${t.titulo}*${t.desc?' — '+t.desc:''}${t.fecha?' 📅 '+t.fecha:''}${t.resp?' 👤 '+t.resp:''}`);
    });
    L.push('');
  });
  L.push('─'.repeat(36),'_Albera & Asociados — Project Management_');
  return L.join('\n');
}

function getReminderProjects(){
  const ms=DB.minutas.get();

    if(!pend.length) return;
    if(!byProj[key]||m.creadaEn>byProj[key].m.creadaEn) byProj[key]={m,pend};
  });
  return Object.values(byProj);
}

function sendReminderEmail(mId){
  const m=DB.minutas.get().find(x=>x.id===mId); if(!m) return;
  const pend=[{m,pend:m.tareas.filter(t=>!t.done)}];
  const contacts=DB.contacts.get();
  const to=contacts.filter(c=>c.on&&c.email).map(c=>c.email).join(',');
  const subj=encodeURIComponent(`RECORDATORIO | ${m.proyecto.toUpperCase()} | Tareas Pendientes`);
  const body=encodeURIComponent(buildReminderText(pend));
  window.location.href=`mailto:${to}?subject=${subj}&body=${body}`;
}

async function scheduleReminderNotif(){
  if(!('Notification' in window)){
    alert('Tu navegador no soporta notificaciones. Usá Chrome en Android para esta función.'); return;
  }
  const perm=await Notification.requestPermission();
  if(perm!=='granted'){
    alert('Permisos denegados. Habilitá las notificaciones en Configuración → tu navegador.'); return;
  }
  sv('aa:notif-enabled',true);
  render();
  alert('✓ Activado. Cada vez que abras la app un martes, recibirás la notificación de recordatorio.');
}

function checkScheduledReminder(){
  if(!ld('aa:notif-enabled',false)) return;
  if(Notification.permission!=='granted') return;
  const now=new Date();
  if(now.getDay()!==2) return; // 2 = martes
  const today=now.toDateString();
  if(ld('aa:last-notif','')===today) return;
  sv('aa:last-notif',today);
  const projects=getReminderProjects();
  if(!projects.length) return;
  const total=projects.reduce((s,p)=>s+p.pend.length,0);
  new Notification('APP MINUTAS — Recordatorio semanal',{
    body:`${total} tarea${total!==1?'s':''} pendiente${total!==1?'s':''} para enviar al equipo hoy.`,
    icon:'icon.svg'
  });
}

render();
